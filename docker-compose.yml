services:
  web:
    build: .
    command: gunicorn curamind.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - .:/app
      - db_data:/app/db
    ports:
      - "8000:8000"
    depends_on:
      - redis

  redis:
    image: redis:7

  celery:
    build: .
    command: celery -A curamind worker --loglevel=info
    volumes:
      - .:/app
      - db_data:/app/db
    depends_on:
      - redis

volumes:
  db_data: